---
use_templates:
  - Charles546/honeydipper-ci@refs/heads/main:resources/hdci.tmpl.yml

cache:
  - /go/pkg/mod
  - /go/bin
  - /tmp/go-build

executors:
  add_apk:
    run_++: |+
      apk add --no-cache gcc musl-dev gpgme-dev pkgconf btrfs-progs-dev
  golang:
    image: docker.io/library/golang:1.26.1-alpine
    cache:
      - /go/pkg/mod
      - /go/bin
      - /tmp/go-build
    env:
      GOCACHE: /tmp/go-build

default_executors+:
  - golang
  - add_apk

triggers:
  - conditions:
      gh_event: push
    stages:
      - checkout-and-cache
      - test
      - lint

stages:
  checkout-and-cache:
    jobs:
      - job_name: go-install
        steps:
          - run: go install ./...
  test:
    requires:
      - checkout-and-cache
    jobs:
      - job_name: go_test
        steps:
          - run: echo $TEST && go test -v ./...
            env:
              TEST: hd-lookup:test
  lint:
    requires:
      - checkout-and-cache
    jobs:
      - job_name: lint
        steps:
          - run: golangci-lint run
            image: golangci/golangci-lint:v2.11.3-alpine
