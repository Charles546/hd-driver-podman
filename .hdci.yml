---
use_templates:
  - Charles546/honeydipper-ci@refs/heads/main:resources/hdci.tmpl.yml

cache:
  /go/pkg/mod: 'hd-go-mod-cache-{{ replace "/" "_" .ctx.git_repo }}-{{ .ctx.git_commit | trunc 7 }}'
  /go/bin: 'hd-go-bin-cache-{{ replace "/" "_" .ctx.git_repo }}-{{ .ctx.git_commit | trunc 7 }}'
  /go/go-build: 'hd-go-build-cache-{{ replace "/" "_" .ctx.git_repo }}-{{ .ctx.git_commit | trunc 7 }}'

executors:
  golang:
    image: docker.io/library/golang:1.26.1-alpine
    cache:
      - /go/pkg/mod
      - /go/bin
    env:
      GOCACHE: /go/go-build

default_executors+:
  - golang

triggers:
  - conditions:
      gh_event: push
    stages:
      - checkout-and-cache
      - test
      - lint

stages:
  checkout-and-cache:
    jobs:
      - job_name: go-install
        steps:
          - run: apk add --no-cache gcc musl-dev gpgme-dev pkgconf btrfs-progs-dev && go install ./...
  test:
    requires:
      - checkout-and-cache
    jobs:
      - job_name: check-license
        steps:
          - run: go test ./...
  lint:
    requires:
      - checkout-and-cache
    jobs:
      - job_name: lint
        steps:
          - run: golangci-lint run
