name: Release And Update Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (for example v0.2.0)"
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: prepare
    uses: Charles546/honeydipper-registry/.github/workflows/release-driver.yml@main
    with:
      driver_name: podman
      binary_name: hd-driver-podman
      go_build_path: ./cmd/hd-driver-podman
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      manifest_file: podman.json
      build_image: golang:1.26-alpine
      cgo_enabled: "1"
      container_prerequisites: "apk add --no-cache gcc musl-dev pkgconfig gpgme-dev libgpg-error-dev libassuan-dev btrfs-progs-dev lvm2-dev"
      mirror_url: https://charles546.github.io/honeydipper-registry/artifacts/hd-driver-podman/${{ needs.prepare.outputs.release_tag }}/linux-amd64/hd-driver-podman
    secrets:
      registry_repo_token: ${{ secrets.REGISTRY_REPO_TOKEN }}
