name: Tests

on:
  push:
    branches: [ main, develop, ci/add-hdci ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install native build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libgpgme-dev libbtrfs-dev

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | grep -v vendor | wc -l)" -gt 0 ]; then
          echo "Please run 'go fmt ./...' to format code"
          exit 1
        fi

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install native build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libgpgme-dev libbtrfs-dev

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest