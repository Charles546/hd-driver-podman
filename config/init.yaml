---
# By default this config loads hd-driver-podman from the remote driver
# registry. To use a pre-fetched local binary instead, load this repo with:
#
# repos:
#   - repo: <this repo>
#     options:
#       use_local_binary: true
#
# Optional repo options for the remote case:
#   registry: override the named registry (default: charles-gh-pages)
#   channel: override the release channel (default: stable)
#   version: pin an exact release version
drivers:
  daemon:
    features:
      operator:
        - name: "driver:podman"
    drivers:
      podman:
        name: podman
        type: '{% if .options.use_local_binary %}builtin{% else %}remote{% end %}'
        handlerData:
{% if .options.use_local_binary %}
          shortName: hd-driver-podman
{% else %}
          registry: '{% default "charles-gh-pages" .options.registry %}'
          channel: '{% default "stable" .options.channel %}'
{% if .options.version %}
          version: '{% .options.version %}'
{% end %}
{% end %}

systems:
  podman:
    functions:
      create_pod:
        driver: podman
        rawAction: create_pod
        parameters:
          pod_spec: $?ctx.podman_pod_spec
          containers: $?ctx.podman_containers
          uri: $?sysData.uri
          identity: $?sysData.identity
          with_work_volume: $?ctx.podman_with_work_volume
          use_work_volume: $?ctx.podman_use_work_volume
          work_volume_mount_point: $?ctx.podman_work_volume_mount_point
        export:
          podman_pod_id: $?data.pod_id
          _log_stream:
            pod_id: $?data.pod_id
            provider: podman
            gh_slug: '{{ resolve_gh_slug .ctx.gh_slug .ctx.git_repo .event.json.repository.full_name }}'
            stream_token: '{{ sign_pod_id .data.pod_id (resolve_gh_slug .ctx.gh_slug .ctx.git_repo .event.json.repository.full_name) }}'
      start_pod:
        driver: podman
        rawAction: start_pod
        parameters:
          pod_id: $ctx.podman_pod_id
          uri: $?sysData.uri
          identity: $?sysData.identity
      wait_pod:
        driver: podman
        rawAction: wait_pod
        parameters:
          pod_id: $ctx.podman_pod_id
          uri: $?sysData.uri
          identity: $?sysData.identity
      get_pod_log:
        driver: podman
        rawAction: get_pod_log
        parameters:
          pod_id: $ctx.podman_pod_id
          uri: $?sysData.uri
          identity: $?sysData.identity
          delete_on_success: '{{ empty .ctx.podman_delete_on_success | not | return }}'
        export:
          podman_pod_log: $data.all,""
      create_volume:
        driver: podman
        rawAction: create_volume
        parameters:
          name: $?ctx.podman_volume_name
          ignore_if_exists: '{{ empty .ctx.podman_volume_ignore_if_exists | not | return }}'
          volume_spec: $?ctx.podman_volume_spec
          uri: $?sysData.uri
          identity: $?sysData.identity
        export_on_success:
          podman_volume_name: $data.volume_name
      delete_volume:
        driver: podman
        rawAction: delete_volume
        parameters:
          volume_name: $ctx.podman_volume_name
          force: $?ctx.podman_volume_force
          uri: $?sysData.uri
          identity: $?sysData.identity

workflows:
  run_podman:
    with:
      podman_system-: podman
    steps:
    - call_function: '{{ .ctx.podman_system}}.create_pod'
      export:
        podman_error: $?labels.reason
      export_on_error:
        podman_error: $labels.reason
      with:
        hooks:
          on_success: $?ctx.podman_on_start
    - on_error: continue
      steps:
        - call_function: '{{ .ctx.podman_system}}.start_pod'
          export:
            podman_error: $?ctx.podman_error,labels.reason
          export_on_error:
            podman_error: $ctx.podman_error,labels.reason
        - call_function: '{{ .ctx.podman_system}}.wait_pod'
          export:
            podman_error: $?ctx.podman_error,labels.reason
          export_on_error:
            podman_error: $ctx.podman_error,labels.reason
        - call_function: '{{ .ctx.podman_system}}.get_pod_log'
          export:
            podman_error: $?ctx.podman_error,labels.reason
          export_on_error:
            podman_error: $ctx.podman_error,labels.reason

  check_slack_interact:
    call_workflow: slack_ask
    with:
      blocks:
        - type: section
          text:
            type: mrkdwn
            text: "Let's test the slack interact!"
